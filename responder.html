<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAB Response Centre</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 99px; }
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}
@keyframes wave {
  from { transform: scaleY(0.3); }
  to { transform: scaleY(1.4); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slidein {
  from { opacity: 0; transform: translateX(-12px); }
  to { opacity: 1; transform: translateX(0); }
}

/* NAV */
#topnav {
  background: #0f172a; color: #fff;
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1e293b; flex-shrink: 0;
}
.nav-logo { display: flex; align-items: center; gap: 12px; }
.nav-icon {
  width: 28px; height: 28px; border-radius: 6px;
  background: linear-gradient(135deg, #e53e3e, #c53030);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.nav-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: -0.01em; }
.nav-badge { font-size: 10px; color: #475569; background: #1e293b; padding: 2px 8px; border-radius: 4px; font-family: monospace; letter-spacing: 0.08em; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-critical { display: flex; align-items: center; gap: 5px; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: #e53e3e; animation: pulse 1.2s ease infinite; display: inline-block; }
.critical-text { font-size: 11px; color: #fc8181; font-weight: 600; }
#clock { font-size: 11px; color: #64748b; font-family: monospace; }
.nav-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 13px; }

/* STAT STRIP */
#statstrip {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 10px 24px; display: flex; gap: 0; flex-shrink: 0; align-items: center;
}
.stat-item { padding: 0 20px; border-right: 1px solid #e2e8f0; text-align: center; }
.stat-item:first-child { text-align: left; }
.stat-item:last-of-type { border-right: none; }
.stat-val { font-size: 20px; font-weight: 800; font-family: 'Syne', sans-serif; line-height: 1.1; }
.stat-label { font-size: 10px; color: #a0aec0; letter-spacing: 0.05em; margin-top: 1px; }
.ai-indicator { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 10px; color: #48bb78; font-weight: 600; }
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: #48bb78; }

/* BODY */
#main { display: flex; flex: 1; overflow: hidden; }

/* LEFT PANEL */
#leftpanel {
  width: 340px; background: #f8fafc;
  border-right: 1px solid #e2e8f0;
  display: flex; flex-direction: column; flex-shrink: 0;
}
#searchbar { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; background: #fff; }
#searchinput {
  width: 100%; padding: 8px 12px; border-radius: 7px;
  border: 1px solid #e2e8f0; font-size: 12px; outline: none;
  background: #f7fafc; color: #2d3748; margin-bottom: 10px;
}
#searchinput:focus { border-color: #90cdf4; }
#filters { display: flex; gap: 5px; }
.filter-btn {
  flex: 1; padding: 4px 2px; font-size: 9.5px; font-weight: 700;
  border-radius: 5px; border: 1px solid #e2e8f0;
  letter-spacing: 0.05em; background: #fff; color: #718096;
  transition: all 0.15s;
}
.filter-btn.active-ALL, .filter-btn.active-ACTIVE { border-color: #2b6cb0; background: #ebf8ff; color: #2b6cb0; }
.filter-btn.active-HIGH { border-color: #e53e3e; background: #fff5f5; color: #e53e3e; }
.filter-btn.active-MODERATE { border-color: #d97706; background: #fffbeb; color: #d97706; }
.filter-btn.active-LOW { border-color: #059669; background: #f0fdf4; color: #059669; }

#alertlist { flex: 1; overflow-y: auto; padding: 12px; }

/* ALERT CARD */
.alert-card {
  background: #fff; border: 1.5px solid #e2e8f0;
  border-radius: 10px; padding: 14px 16px;
  cursor: pointer; transition: all 0.2s ease;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  margin-bottom: 10px; animation: slidein 0.3s ease;
}
.alert-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.alert-card.selected { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-name { font-size: 13px; font-weight: 700; color: #1a202c; }
.card-meta { font-size: 11px; color: #718096; font-family: monospace; }
.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.urgency-badge {
  font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
  padding: 2px 8px; border-radius: 99px; border: 1px solid;
}
.card-elapsed { font-size: 10px; color: #a0aec0; }
.card-transcript {
  font-size: 11px; color: #4a5568; background: #f7fafc;
  border-radius: 6px; padding: 5px 8px; margin-bottom: 8px; font-style: italic;
}
.card-bottom { display: flex; justify-content: space-between; align-items: center; }
.status-chip { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; }

/* CONFIDENCE BAR */
.conf-row { display: flex; align-items: center; gap: 8px; min-width: 90px; }
.conf-track { flex: 1; height: 5px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 99px; }
.conf-label { font-size: 11px; font-family: monospace; font-weight: 700; min-width: 36px; text-align: right; }

/* RIGHT PANEL */
#rightpanel { flex: 1; background: #fff; overflow-y: auto; }
#detailpanel { padding: 24px 28px; }
#empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #a0aec0; font-size: 14px; }

/* DETAIL */
.detail-header { margin-bottom: 24px; }
.detail-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.case-id { font-size: 11px; font-family: monospace; color: #a0aec0; letter-spacing: 0.1em; margin-bottom: 4px; }
.case-name { font-size: 22px; font-weight: 800; color: #1a202c; font-family: 'Syne', sans-serif; }
.case-sub { font-size: 13px; color: #718096; margin-top: 2px; }
.urgency-ring {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: 0 0 0 6px rgba(0,0,0,0.06); flex-shrink: 0;
}
.ring-label { font-size: 11px; font-weight: 800; letter-spacing: 0.05em; }
.ring-conf { font-size: 10px; }
.urgency-banner {
  border-radius: 8px; padding: 10px 14px;
  border-left: 4px solid; font-size: 13px; font-weight: 600;
}

.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: #a0aec0; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
.detail-section { margin-bottom: 20px; }

/* ADDRESS */
.address-box {
  background: #f7fafc; border: 1px solid #e2e8f0;
  border-radius: 8px; padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.address-text { font-size: 14px; font-weight: 600; color: #1a202c; }
.address-sub { font-size: 11px; color: #a0aec0; margin-top: 2px; }
.map-btn {
  font-size: 11px; padding: 5px 12px; border-radius: 6px;
  background: #2b6cb0; color: #fff; border: none; font-weight: 600;
}

/* AUDIO PLAYER */
.audio-box {
  border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 14px; transition: all 0.3s;
}
.audio-box.playing { background: #fff5f5; border-color: #feb2b2; }
.audio-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; color: #fff; font-size: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.2s;
}
.audio-filename { font-size: 11px; font-family: monospace; color: #718096; margin-bottom: 4px; }
.waveform { display: flex; align-items: center; gap: 2px; height: 28px; }
.wbar { width: 3px; border-radius: 2px; background: #cbd5e0; transition: height 0.3s; }
.wbar.active { background: #e53e3e; }
.transcript-box {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 8px 12px; font-size: 12px; color: #4a5568; font-style: italic;
}
.transcript-prefix { font-style: normal; font-weight: 600; color: #718096; font-size: 10px; letter-spacing: 0.08em; }

/* CONDITIONS */
.conditions-row { display: flex; flex-wrap: wrap; gap: 6px; }
.condition-tag { font-size: 11px; padding: 4px 10px; border-radius: 99px; background: #ebf4ff; color: #2b6cb0; border: 1px solid #bee3f8; font-weight: 500; }

/* ACTIONS */
.actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.action-btn {
  padding: 9px 8px; border-radius: 7px; background: #fff;
  font-size: 12px; font-weight: 600; transition: all 0.2s; text-align: left;
  border: 1.5px solid;
}
.action-btn:hover { opacity: 0.85; }
.status-btns { display: flex; gap: 8px; }
.status-toggle {
  flex: 1; padding: 8px 4px; border-radius: 7px;
  font-size: 11px; font-weight: 700; transition: all 0.2s; text-transform: capitalize;
}

/* NEW ALERT TOAST */
#toast {
  position: fixed; top: 70px; right: 20px;
  background: #1a202c; color: #fff;
  border-left: 4px solid #e53e3e;
  padding: 12px 16px; border-radius: 8px;
  font-size: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  animation: fadeIn 0.3s ease; z-index: 999;
  display: none;
}
.toast-title { font-weight: 700; margin-bottom: 2px; color: #fc8181; }
</style>
</head>
<body>

<!-- TOP NAV -->
<div id="topnav">
  <div class="nav-logo">
    <div class="nav-icon">🔔</div>
    <span class="nav-title">PAB Response Centre</span>
    <span class="nav-badge">HOTLINE OPS v2.1</span>
  </div>
  <div class="nav-right">
    <div class="nav-critical" id="criticalIndicator" style="display:none">
      <span class="pulse-dot"></span>
      <span class="critical-text" id="criticalText"></span>
    </div>
    <span id="clock"></span>
    <div class="nav-avatar">👤</div>
  </div>
</div>

<!-- STAT STRIP -->
<div id="statstrip">
  <div class="stat-item">
    <div class="stat-val" id="statActive" style="color:#1a202c">0</div>
    <div class="stat-label">Active Alerts</div>
  </div>
  <div class="stat-item">
    <div class="stat-val" id="statHigh" style="color:#e53e3e">0</div>
    <div class="stat-label">🔴 HIGH</div>
  </div>
  <div class="stat-item">
    <div class="stat-val" id="statMod" style="color:#d97706">0</div>
    <div class="stat-label">🟡 MODERATE</div>
  </div>
  <div class="stat-item">
    <div class="stat-val" id="statLow" style="color:#059669">0</div>
    <div class="stat-label">🟢 LOW</div>
  </div>
  <div class="stat-item" style="border-right:none">
    <div class="stat-val" id="statResolved" style="color:#718096">0</div>
    <div class="stat-label">✓ Resolved Today</div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- LEFT PANEL -->
  <div id="leftpanel">
    <div id="searchbar">
      <input id="searchinput" type="text" placeholder="Search name, ID, address…" oninput="renderList()" />
      <div id="filters">
        <button class="filter-btn active-ALL" data-filter="ALL" onclick="setFilter('ALL')">ALL</button>
        <button class="filter-btn" data-filter="ACTIVE" onclick="setFilter('ACTIVE')">ACTIVE</button>
        <button class="filter-btn" data-filter="HIGH" onclick="setFilter('HIGH')">HIGH</button>
        <button class="filter-btn" data-filter="MODERATE" onclick="setFilter('MODERATE')">MOD</button>
        <button class="filter-btn" data-filter="LOW" onclick="setFilter('LOW')">LOW</button>
      </div>
    </div>
    <div id="alertlist"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="rightpanel">
    <div id="empty-state">Select an alert to view details</div>
    <div id="detailpanel" style="display:none"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <div class="toast-title">🔴 New HIGH Alert Incoming</div>
  <div id="toastBody"></div>
</div>

<script>
const URGENCY = {
  HIGH:     { color:"#e53e3e", bg:"#fff5f5", border:"#feb2b2", light:"#FFF1F1", icon:"🔴", rank:1 },
  MODERATE: { color:"#d97706", bg:"#fffbeb", border:"#fcd34d", light:"#FFFBEB", icon:"🟡", rank:2 },
  LOW:      { color:"#059669", bg:"#f0fdf4", border:"#6ee7b7", light:"#F0FDF4", icon:"🟢", rank:3 },
};
const STATUS = {
  pending:      { label:"Pending",      color:"#e53e3e", bg:"#fff5f5" },
  acknowledged: { label:"Acknowledged", color:"#d97706", bg:"#fffbeb" },
  resolved:     { label:"Resolved",     color:"#059669", bg:"#f0fdf4" },
};

let alerts = [
  { id:"PAB-0047", name:"Mdm Tan Bee Hiang", age:78, address:"Blk 112 Toa Payoh Lor 1, #08-234, Singapore 310112", time:"09:14 AM", elapsed:142, urgency:"HIGH", confidence:0.91, audioFile:"alert_0047.wav", signals:{ pitch:"High / unstable", energy:"Elevated", speechRate:"Rapid", transcript:"Help… chest… hurts bad…" }, conditions:["Cardiac history","Hypertension","On Warfarin"], status:"pending" },
  { id:"PAB-0051", name:"Mr Ramesh s/o Pillai", age:82, address:"Blk 45 Bedok North Ave 3, #03-112, Singapore 460045", time:"09:22 AM", elapsed:74, urgency:"HIGH", confidence:0.87, audioFile:"alert_0051.wav", signals:{ pitch:"Elevated", energy:"High", speechRate:"Fast", transcript:"I fell… cannot get up… dizzy…" }, conditions:["Fall history (×3)","Osteoporosis","Diabetes"], status:"pending" },
  { id:"PAB-0053", name:"Mdm Lim Siew Eng", age:74, address:"Blk 203 Ang Mo Kio Ave 8, #12-05, Singapore 560203", time:"09:31 AM", elapsed:25, urgency:"MODERATE", confidence:0.76, audioFile:"alert_0053.wav", signals:{ pitch:"Slightly elevated", energy:"Moderate", speechRate:"Normal", transcript:"I think I fell… arm pain… ok ok…" }, conditions:["Mild hypertension"], status:"pending" },
  { id:"PAB-0048", name:"Mr Goh Ah Kow", age:71, address:"Blk 88 Clementi Ave 6, #05-321, Singapore 120088", time:"09:09 AM", elapsed:197, urgency:"MODERATE", confidence:0.68, audioFile:"alert_0048.wav", signals:{ pitch:"Normal range", energy:"Low-moderate", speechRate:"Normal", transcript:"Hello? I pressed by accident… but my knee hurts a bit." }, conditions:["Knee osteoarthritis"], status:"acknowledged" },
  { id:"PAB-0055", name:"Mdm Fatimah bte Osman", age:69, address:"Blk 34 Jurong West St 52, #07-18, Singapore 640034", time:"09:38 AM", elapsed:8, urgency:"LOW", confidence:0.82, audioFile:"alert_0055.wav", signals:{ pitch:"Normal", energy:"Normal", speechRate:"Slow / calm", transcript:"Hello I pressed the button… I feel a bit giddy only." }, conditions:["Mild vertigo (managed)"], status:"pending" },
  { id:"PAB-0049", name:"Mr Chong Weng Fatt", age:76, address:"Blk 9 Jalan Besar, #02-44, Singapore 208785", time:"09:11 AM", elapsed:183, urgency:"LOW", confidence:0.79, audioFile:"alert_0049.wav", signals:{ pitch:"Normal", energy:"Low", speechRate:"Slow", transcript:"I pressed the button… I'm ok… just wanted to check." }, conditions:["None significant"], status:"resolved" },
];

let selectedId = "PAB-0047";
let currentFilter = "ALL";
let playingId = null;
let waveInterval = null;

// Clock
function updateClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("en-SG", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
}
setInterval(updateClock, 1000);
updateClock();

// Elapsed timers
setInterval(() => {
  alerts.forEach(a => { if (a.status !== "resolved") a.elapsed++; });
  alerts.forEach(a => {
    const el = document.getElementById("elapsed-" + a.id);
    if (el) el.textContent = formatElapsed(a.elapsed);
  });
}, 1000);

// Stats
function updateStats() {
  const active = alerts.filter(a => a.status !== "resolved");
  document.getElementById("statActive").textContent = active.length;
  document.getElementById("statHigh").textContent = active.filter(a => a.urgency === "HIGH").length;
  document.getElementById("statMod").textContent = active.filter(a => a.urgency === "MODERATE").length;
  document.getElementById("statLow").textContent = active.filter(a => a.urgency === "LOW").length;
  document.getElementById("statResolved").textContent = alerts.filter(a => a.status === "resolved").length;

  const highCount = active.filter(a => a.urgency === "HIGH").length;
  const ind = document.getElementById("criticalIndicator");
  const txt = document.getElementById("criticalText");
  if (highCount > 0) {
    ind.style.display = "flex";
    txt.textContent = `${highCount} CRITICAL ACTIVE`;
  } else {
    ind.style.display = "none";
  }
}

function formatElapsed(s) {
  if (s < 60) return `${s}s ago`;
  return `${Math.floor(s/60)}m ${s%60}s ago`;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.className = "filter-btn";
    if (b.dataset.filter === f) b.classList.add(`active-${f}`);
  });
  renderList();
}

function getFiltered() {
  const q = document.getElementById("searchinput").value.toLowerCase();
  return [...alerts]
    .sort((a,b) => URGENCY[a.urgency].rank - URGENCY[b.urgency].rank)
    .filter(a => {
      if (a.status === "resolved") return false;
      const mf = currentFilter === "ALL" ||
        (currentFilter === "ACTIVE" && a.status !== "resolved") ||
        a.urgency === currentFilter;
      const ms = !q || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q) || a.address.toLowerCase().includes(q);
      return mf && ms;
    });
}

function renderList() {
  updateStats();
  const list = document.getElementById("alertlist");
  const items = getFiltered();

  if (items.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:#a0aec0;font-size:13px;margin-top:40px">No alerts match filter</div>`;
    return;
  }

  list.innerHTML = items.map(a => {
    const cfg = URGENCY[a.urgency];
    const scfg = STATUS[a.status];
    const sel = a.id === selectedId;
    const confPct = Math.round(a.confidence * 100);
    const confColor = confPct >= 85 ? "#e53e3e" : confPct >= 70 ? "#d97706" : "#059669";

    return `<div class="alert-card ${sel ? 'selected' : ''}" 
      onclick="selectAlert('${a.id}')"
      style="border-left:4px solid ${cfg.color}; ${sel ? `background:${cfg.light}; border-color:${cfg.color};` : ''}">
      <div class="card-top">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <span class="card-name">${a.name}</span>
            <span style="font-size:11px;color:#718096">Age ${a.age}</span>
          </div>
          <div class="card-meta">${a.id} · ${a.time}</div>
        </div>
        <div class="card-right">
          <span class="urgency-badge" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">${cfg.icon} ${a.urgency}</span>
          <span class="card-elapsed" id="elapsed-${a.id}">${formatElapsed(a.elapsed)}</span>
        </div>
      </div>
      <div class="card-transcript">"${a.signals.transcript}"</div>
      <div class="card-bottom">
        <span class="status-chip" style="color:${scfg.color};background:${scfg.bg}">● ${scfg.label}</span>
        <div class="conf-row">
          <div class="conf-track"><div class="conf-fill" style="width:${confPct}%;background:${confColor}"></div></div>
          <span class="conf-label" style="color:${confColor}">${confPct}%</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function selectAlert(id) {
  selectedId = id;
  renderList();
  renderDetail();
}

function renderDetail() {
  const a = alerts.find(x => x.id === selectedId);
  if (!a) return;

  document.getElementById("empty-state").style.display = "none";
  const panel = document.getElementById("detailpanel");
  panel.style.display = "block";

  const cfg = URGENCY[a.urgency];
  const confPct = Math.round(a.confidence * 100);
  const banner = {
    HIGH: "⚠ Immediate response required — dispatch SCDF / on-call responder now",
    MODERATE: "⚡ Timely response needed — contact next-of-kin and assess within 10 min",
    LOW: "✓ Non-critical — welfare check call recommended within 30 min",
  }[a.urgency];

  const isPlaying = playingId === a.id;

  const waveBars = Array.from({length:28}, (_,i) => {
    const h = 4 + Math.sin(i*0.8)*5 + 3;
    return `<div class="wbar ${isPlaying ? 'active' : ''}" id="wbar${i}" style="height:${h}px; animation:${isPlaying ? `wave ${0.3 + (i%5)*0.08}s ease-in-out infinite alternate` : 'none'}"></div>`;
  }).join("");

  const statusBtns = ["pending","acknowledged","resolved"].map(s => {
    const scfg = STATUS[s];
    const active = a.status === s;
    return `<button class="status-toggle" 
      style="border:1px solid ${scfg.color};background:${active ? scfg.color : '#fff'};color:${active ? '#fff' : scfg.color}"
      onclick="setStatus('${a.id}','${s}')">${scfg.label}</button>`;
  }).join("");

	  const actionBtns = [
	    {color:"#2b6cb0", label:"📞 Call Senior"},
	    {color:"#276749", label:"🚑 Dispatch SCDF"},
	    {color:"#744210", label:"📱 Notify NOK"},
	    {color:"#553c9a", label:"👷 Send Volunteer"},
	  ].map(b => `<button class="action-btn" style="color:${b.color};border-color:${b.color}" onclick="flashAction(this,'${b.color}')">${b.label}</button>`).join("");

  const aiReason = a.llm_note || a.llm_reasoning_summary || "";
  const aiFlags = a.triage_flags || (Array.isArray(a.flags) ? a.flags.join(", ") : "");
  const aiSource = a.decision_source || "";

	  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-top">
        <div>
          <div class="case-id">CASE ${a.id}</div>
          <div class="case-name">${a.name}</div>
          <div class="case-sub">Age ${a.age} · Pressed at ${a.time}</div>
        </div>
        <div class="urgency-ring" style="background:${cfg.bg};border:3px solid ${cfg.color}">
          <div class="ring-label" style="color:${cfg.color}">${a.urgency}</div>
          <div class="ring-conf" style="color:${cfg.color}">${confPct}% conf.</div>
        </div>
      </div>
      <div class="urgency-banner" style="background:${cfg.bg};border-color:${cfg.color};color:${cfg.color}">${banner}</div>
    </div>

    <div class="detail-section">
      <div class="section-label">📍 Location</div>
      <div class="address-box">
        <div>
          <div class="address-text">${a.address}</div>
          <div class="address-sub">Singapore</div>
        </div>
        <button class="map-btn" onclick="window.open('https://maps.google.com?q=${encodeURIComponent(a.address)}','_blank')">Open Map ↗</button>
      </div>
    </div>

    <div class="detail-section">
      <div class="section-label">🎙 Audio Alert</div>
      <div class="audio-box ${isPlaying ? 'playing' : ''}" id="audioBox">
        <div class="audio-top">
          <button class="play-btn" id="playBtn" style="background:${isPlaying ? '#e53e3e' : '#2b6cb0'}" onclick="togglePlay('${a.id}')">
            ${isPlaying ? '⏹' : '▶'}
          </button>
          <div style="flex:1">
            <div class="audio-filename">${a.audioFile}</div>
            <div class="waveform">${waveBars}</div>
          </div>
        </div>
        <div class="transcript-box">
          <span class="transcript-prefix">AI TRANSCRIPT: </span>"${a.signals.transcript}"
        </div>
      </div>
    </div>

    ${(aiReason || aiFlags || aiSource) ? `
    <div class="detail-section">
      <div class="section-label">🤖 AI Triage Notes</div>
      <div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;">
        ${aiSource ? `<div style="font-size:11px;color:#718096"><strong>Decision:</strong> ${aiSource}</div>` : ''}
        ${aiFlags ? `<div style="font-size:11px;color:#718096"><strong>Flags:</strong> ${aiFlags}</div>` : ''}
        ${aiReason ? `<div style="font-size:12px;color:#4a5568;line-height:1.6"><strong>Reason:</strong> ${aiReason}</div>` : ''}
      </div>
    </div>` : ''}

    <div class="detail-section">
      <div class="section-label">🏥 Known Conditions</div>
      <div class="conditions-row">${a.conditions.map(c=>`<span class="condition-tag">${c}</span>`).join("")}</div>
    </div>

    <div class="detail-section">
      <div class="section-label">⚡ Responder Actions</div>
      <div class="actions-grid">${actionBtns}</div>
      <div class="status-btns">${statusBtns}</div>
    </div>
  `;
}

function flashAction(btn, color) {
  const orig = btn.innerHTML;
  btn.style.background = color;
  btn.style.color = "#fff";
  btn.innerHTML = "✓ Sent";
  setTimeout(() => {
    btn.style.background = "#fff";
    btn.style.color = color;
    btn.innerHTML = orig;
  }, 1500);
}

function setStatus(id, status) {
  alerts = alerts.map(a => a.id === id ? {...a, status} : a);
  renderList();
  renderDetail();
}

function togglePlay(id) {
  if (playingId === id) {
    playingId = null;
    clearTimeout(waveInterval);
  } else {
    playingId = id;
    clearTimeout(waveInterval);
    waveInterval = setTimeout(() => { playingId = null; renderDetail(); }, 4000);
  }
  renderDetail();
}

// Simulate new alert after 6s
setTimeout(() => {
  const newAlert = {
    id:"PAB-0058", name:"Mr Lee Ah Seng", age:84,
    address:"Blk 77 Redhill Close, #04-22, Singapore 150077",
    time: new Date().toLocaleTimeString("en-SG",{hour:"2-digit",minute:"2-digit"}),
    elapsed:0, urgency:"HIGH", confidence:0.93,
    audioFile:"alert_0058.wav",
    signals:{ pitch:"Very high / erratic", energy:"Very high", speechRate:"Rapid/broken", transcript:"Pain… cannot breathe… help me please…" },
    conditions:["COPD","Cardiac stent (2021)","Hypertension"],
    status:"pending"
  };
  alerts = [newAlert, ...alerts];
  selectedId = "PAB-0058";
  renderList();
  renderDetail();

  // Toast
  const toast = document.getElementById("toast");
  document.getElementById("toastBody").textContent = `${newAlert.name}, Age ${newAlert.age} — "${newAlert.signals.transcript}"`;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 4000);
}, 6000);

// Init
renderList();
renderDetail();
</script>
</body>
